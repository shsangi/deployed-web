<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 60s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveBackground {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(-30%, -30%) rotate(10deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            text-align: center;
        }

        .word-container {
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .current-word {
            font-size: 4rem;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(135deg, #fff5e6, #ffd6b0, #ffb6c1, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            background-size: 300% 300%;
            animation: gradientFlow 6s ease infinite, wordAppear 0.8s ease-out;
            text-shadow: 0 0 30px rgba(255, 215, 255, 0.5);
            line-height: 1.3;
            display: inline-block;
            letter-spacing: 2px;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes wordAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(10px);
            }
            60% {
                transform: translateY(-5px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Subtle progress indicator (barely visible) */
        .progress {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4);
            width: 100%;
            transform-origin: left;
            animation: progress 3s linear infinite;
            opacity: 0.3;
        }

        @keyframes progress {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        /* Floating particles (very subtle) */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 20s infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translate(100px, -100px) scale(0); opacity: 0; }
        }

        @media (max-width: 768px) {
            .current-word {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .current-word {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="word-container">
            <div class="current-word" id="currentWord"></div>
        </div>
    </div>
    <div class="progress" id="progressBar"></div>

    <script>
        const description = "Pirah is the radiant heart of her home, blending grace with a patient spirit. As a devoted wife, her unwavering love and care ensure her husband's constant happiness. An attentive mother, she nurtures her family with deep mindfulness, creating a sanctuary of peace and beauty for everyone she loves.";
        
        // Split into words and clean up
        const words = description.split(' ').map(word => word.trim()).filter(word => word.length > 0);
        
        let currentIndex = 0;
        const currentWordElement = document.getElementById('currentWord');
        const progressBar = document.getElementById('progressBar');

        // Create floating particles (optional - very subtle background effect)
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 100 + 50;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 20}s`;
                document.body.appendChild(particle);
            }
        }

        function updateWord() {
            // Remove and re-add animation to trigger it each time
            currentWordElement.style.animation = 'none';
            currentWordElement.offsetHeight; // Force reflow
            currentWordElement.style.animation = 'gradientFlow 6s ease infinite, wordAppear 0.8s ease-out';
            
            currentWordElement.textContent = words[currentIndex];
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % words.length;
            updateWord();
        }

        // Start the animation
        createParticles();
        updateWord();
        
        // Change word every 3 seconds
        setInterval(nextWord, 3000);

        // Optional: Add a subtle gradient change over time
        let hue = 0;
        setInterval(() => {
            hue = (hue + 1) % 360;
            document.body.style.background = `linear-gradient(135deg, 
                hsl(${hue}, 30%, 15%), 
                hsl(${hue + 30}, 30%, 15%), 
                hsl(${hue + 60}, 30%, 15%))`;
        }, 100);
    </script>
</body>
</html>
