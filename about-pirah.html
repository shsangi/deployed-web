<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirah - The Radiant Heart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        .background-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 4px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 107, 107, 0.5)); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-top: 1rem;
            text-transform: uppercase;
        }

        .word-carousel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 4rem 2rem;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .word-carousel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4, #ffd700);
            border-radius: 20px;
            animation: borderGlow 3s linear infinite;
            z-index: -1;
        }

        @keyframes borderGlow {
            0% { filter: blur(5px); opacity: 0.5; }
            50% { filter: blur(10px); opacity: 1; }
            100% { filter: blur(5px); opacity: 0.5; }
        }

        .word-container {
            text-align: center;
            position: relative;
        }

        .current-word {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            display: inline-block;
            animation: wordAppear 0.5s ease-out;
            line-height: 1.4;
            max-width: 800px;
            margin: 0 auto;
        }

        @keyframes wordAppear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .word-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            animation: progress 3s linear infinite;
        }

        @keyframes progress {
            0% { width: 0; }
            100% { width: 100%; }
        }

        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            border-color: #ffd700;
        }

        .word-counter {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        .control-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0.5rem;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255, 255, 255, 0.8);
            font-style: italic;
        }

        .heart-icon {
            color: #ff6b6b;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
            margin: 0 5px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
            
            .current-word {
                font-size: 2rem;
            }
            
            .word-carousel {
                padding: 2rem 1rem;
                min-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="background-particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1>✨ PIRAH ✨</h1>
            <div class="subtitle">The Radiant Heart</div>
        </div>

        <div class="word-carousel">
            <div class="word-container">
                <div class="current-word" id="currentWord"></div>
                <div class="word-progress" id="progressBar"></div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="prevWord()">←</button>
            <span class="word-counter" id="wordCounter">1 / 31</span>
            <button class="nav-btn" id="nextBtn" onclick="nextWord()">→</button>
        </div>

        <div style="text-align: center; margin-top: 1rem;">
            <button class="control-btn" id="playPauseBtn" onclick="togglePlayPause()">⏸️ Pause</button>
            <button class="control-btn" id="restartBtn" onclick="restartAnimation()">↺ Restart</button>
        </div>

        <div class="footer">
            <span>Made with <span class="heart-icon">❤️</span> for Pirah</span>
        </div>
    </div>

    <script>
        const description = "Pirah is the radiant heart of her home, blending grace with a patient spirit. As a devoted wife, her unwavering love and care ensure her husband's constant happiness. An attentive mother, she nurtures her family with deep mindfulness, creating a sanctuary of peace and beauty for everyone she loves.";
        
        // Split into words and clean up
        const words = description.split(' ').map(word => word.trim()).filter(word => word.length > 0);
        
        let currentIndex = 0;
        let isPlaying = true;
        let intervalId;
        let progressIntervalId;

        const currentWordElement = document.getElementById('currentWord');
        const wordCounterElement = document.getElementById('wordCounter');
        const progressBar = document.getElementById('progressBar');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // Create animated background particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 10 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particlesContainer.appendChild(particle);
            }
        }

        function updateWord() {
            // Add animation class to trigger fade effect
            currentWordElement.style.animation = 'none';
            currentWordElement.offsetHeight; // Trigger reflow
            currentWordElement.style.animation = 'wordAppear 0.5s ease-out';
            
            currentWordElement.textContent = words[currentIndex];
            wordCounterElement.textContent = `${currentIndex + 1} / ${words.length}`;
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % words.length;
            updateWord();
            resetProgress();
        }

        function prevWord() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateWord();
            resetProgress();
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? '⏸️ Pause' : '▶️ Play';
            
            if (isPlaying) {
                startAnimation();
            } else {
                stopAnimation();
            }
        }

        function startAnimation() {
            // Clear any existing intervals
            stopAnimation();
            
            // Start new intervals
            intervalId = setInterval(() => {
                nextWord();
            }, 3000);
            
            // Reset and start progress bar
            resetProgress();
        }

        function stopAnimation() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            if (progressIntervalId) {
                clearInterval(progressIntervalId);
                progressIntervalId = null;
            }
            progressBar.style.animation = 'none';
        }

        function resetProgress() {
            progressBar.style.animation = 'none';
            progressBar.offsetHeight; // Trigger reflow
            progressBar.style.animation = 'progress 3s linear infinite';
        }

        function restartAnimation() {
            currentIndex = 0;
            updateWord();
            resetProgress();
            
            if (!isPlaying) {
                togglePlayPause();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevWord();
                if (isPlaying) {
                    // Temporarily pause auto-play when manually navigating
                    stopAnimation();
                    startAnimation();
                }
            } else if (e.key === 'ArrowRight') {
                nextWord();
                if (isPlaying) {
                    stopAnimation();
                    startAnimation();
                }
            } else if (e.key === ' ') {
                e.preventDefault();
                togglePlayPause();
            }
        });

        // Initialize
        createParticles();
        updateWord();
        startAnimation();

        // Add touch support for mobile
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const difference = touchEndX - touchStartX;
            
            if (Math.abs(difference) > 50) {
                if (difference > 0) {
                    prevWord();
                } else {
                    nextWord();
                }
                
                if (isPlaying) {
                    stopAnimation();
                    startAnimation();
                }
            }
            
            touchStartX = 0;
        });

        // Cleanup on page hide
        window.addEventListener('beforeunload', () => {
            stopAnimation();
        });
    </script>
</body>
</html>
